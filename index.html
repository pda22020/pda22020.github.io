<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Poopy-Shooty VR</title>
  <script src="https://aframe.io"></script>
</head>
<body style="margin: 0; overflow: hidden;">
<script>
 let score = 0;

 // Έλεγχος για το Space (Πληκτρολόγιο)
 document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') shoot(document.querySelector('a-camera'));
});

 // Η συνάρτηση βολής δέχεται πλέον το "source" (κάμερα ή controller)
 function shoot(sourceEl) {
  let bullet = document.createElement('a-sphere');
  bullet.setAttribute('radius', '0.15');
  bullet.setAttribute('color', 'yellow');
  
  let pos = sourceEl.object3D.position.clone();
  let dir = new THREE.Vector3(0, 0, -1);
  
  // Υπολογισμός κατεύθυνσης βάσει του rotation της κάμερας ή του controller
  dir.applyQuaternion(sourceEl.object3D.quaternion);
  
  bullet.setAttribute('position', pos);
  bullet.dataset.dx = dir.x;
  bullet.dataset.dy = dir.y;
  bullet.dataset.dz = dir.z;
  bullet.setAttribute('class', 'bullet');
  bullet.setAttribute('bullet-move', ''); // Ενεργοποίηση κίνησης αμέσως
  document.querySelector('a-scene').appendChild(bullet);
  setTimeout(() => { if(bullet.parentNode) bullet.remove(); }, 2500);
}

AFRAME.registerComponent('bullet-move', {
  tick: function () {
    let el = this.el;
    let pos = el.object3D.position;
    pos.x += parseFloat(el.dataset.dx) * 0.8;
    pos.y += parseFloat(el.dataset.dy) * 0.8;
    pos.z += parseFloat(el.dataset.dz) * 0.8;
    document.querySelectorAll('.enemy').forEach(enemy => {
      let ep = enemy.object3D.position;
      if (pos.distanceTo(ep) < 1.5) {
        if(enemy.parentNode) enemy.remove();
        if(el.parentNode) el.remove();
        score++;
        document.querySelector('#score').setAttribute('value', 'Score: ' + score);
      }
    });
  }
});

AFRAME.registerComponent('enemy-ai', {
  tick: function () {
    let player = document.querySelector('a-camera');
    let playerPos = player.object3D.position;
    let enemyPos = this.el.object3D.position;
    let dir = new THREE.Vector3().subVectors(playerPos, enemyPos).normalize();
    let speed = 0.15; 
    enemyPos.x += dir.x * speed;
    enemyPos.y += dir.y * speed;
    enemyPos.z += dir.z * speed;
    let dist = enemyPos.distanceTo(playerPos);
    if (dist < 2.5) {
      alert("Game Over! Τελικό Σκορ: " + score);
      location.reload();
    }
  }
});

// Component για να ακούει τα VR Controllers
AFRAME.registerComponent('vr-shoot', {
  init: function () {
    this.el.addEventListener('triggerdown', () => {
      shoot(this.el); // Πυροβολεί από το controller
    });
  }
});

setInterval(() => {
  let enemy = document.createElement('a-sphere');
  enemy.setAttribute('class', 'enemy');
  enemy.setAttribute('radius', '1');
  enemy.setAttribute('color', '#5C4033');
  let x = Math.random() * 30 - 15;
  let y = Math.random() * 5 + 1;
  enemy.setAttribute('position', `${x} ${y} -40`);
  enemy.setAttribute('enemy-ai', '');
  document.querySelector('a-scene').appendChild(enemy);
}, 1500);

</script>

<a-scene>
  <!-- Ο αρχικός σου κόκκινος κόσμος -->
  <a-box position="0 10 0" width="40" height="20" depth="80" color="#ff0000" material="side: double"></a-box>
  
  <a-camera wasd-controls look-controls>
    <a-cursor color="yellow"></a-cursor>
    <a-text id="score" 
            value="Score: 0" 
            position="-0.8 0.5 -1" 
            scale="0.4 0.4 0.4"
            color="white"></a-text>
  </a-camera>

  <!-- Προσθήκη Controllers για VR -->
  
  
</a-scene>

</body>
</html>
