<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Poopy-Shooty VR</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
<script>
 let score = 0;

 // Συνάρτηση βολής που δέχεται το controller ως σημείο εκκίνησης
 function shoot(controllerEl) {
  let scene = document.querySelector('a-scene');
  let bullet = document.createElement('a-sphere');
  bullet.setAttribute('radius', '0.15');
  bullet.setAttribute('color', 'yellow');
  
  // Παίρνουμε τη θέση και την κατεύθυνση του χειριστηρίου
  let pos = new THREE.Vector3();
  controllerEl.object3D.getWorldPosition(pos);
  
  let dir = new THREE.Vector3(0, 0, -1);
  dir.applyQuaternion(controllerEl.object3D.quaternion);
  
  bullet.setAttribute('position', pos);
  bullet.dataset.dx = dir.x;
  bullet.dataset.dy = dir.y;
  bullet.dataset.dz = dir.z;
  bullet.setAttribute('class', 'bullet');
  bullet.setAttribute('bullet-move', ''); // Προσθήκη κίνησης αμέσως
  scene.appendChild(bullet);
  
  setTimeout(() => { if(bullet.parentNode) bullet.remove(); }, 2500);
}

// Component για την κίνηση της σφαίρας
AFRAME.registerComponent('bullet-move', {
  tick: function () {
    let el = this.el;
    let pos = el.object3D.position;
    pos.x += parseFloat(el.dataset.dx) * 0.8;
    pos.y += parseFloat(el.dataset.dy) * 0.8;
    pos.z += parseFloat(el.dataset.dz) * 0.8;

    document.querySelectorAll('.enemy').forEach(enemy => {
      let ep = enemy.object3D.position;
      if (pos.distanceTo(ep) < 1.5) {
        if(enemy.parentNode) enemy.remove();
        if(el.parentNode) el.remove();
        score++;
        document.querySelector('#score').setAttribute('value', 'Score: ' + score);
      }
    });
  }
});

// Component για την κίνηση του εχθρού προς τον παίκτη
AFRAME.registerComponent('enemy-ai', {
  tick: function () {
    let camera = document.querySelector('a-camera');
    let playerPos = camera.object3D.position;
    let enemyPos = this.el.object3D.position;
    let dir = new THREE.Vector3().subVectors(playerPos, enemyPos).normalize();
    let speed = 0.05; // Μειωμένη ταχύτητα για VR για να είναι δίκαιο
    
    enemyPos.x += dir.x * speed;
    enemyPos.y += dir.y * speed;
    enemyPos.z += dir.z * speed;

    if (enemyPos.distanceTo(playerPos) < 1.5) {
      alert("Game Over! Σκορ: " + score);
      location.reload();
    }
  }
});

// Listener για το πάτημα της σκανδάλης (trigger) στα controllers
AFRAME.registerComponent('controller-listener', {
  init: function () {
    this.el.addEventListener('triggerdown', (e) => {
      shoot(this.el);
    });
  }
});

// Δημιουργία εχθρών κάθε 2 δευτερόλεπτα
setInterval(() => {
  let scene = document.querySelector('a-scene');
  if(!scene) return;
  let enemy = document.createElement('a-sphere');
  enemy.setAttribute('class', 'enemy');
  enemy.setAttribute('radius', '0.8');
  enemy.setAttribute('color', '#5C4033');
  
  // Εμφάνιση εχθρών σε τυχαία σημεία γύρω από τον παίκτη
  let angle = Math.random() * Math.PI * 2;
  let dist = 25;
  let x = Math.cos(angle) * dist;
  let z = Math.sin(angle) * dist;
  
  enemy.setAttribute('position', `${x} 1.5 ${z}`);
  enemy.setAttribute('enemy-ai', '');
  scene.appendChild(enemy);
}, 2000);
</script>

<a-scene>
  <!-- Περιβάλλον -->
  <a-sky color="#87CEEB"></a-sky>
  <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#222"></a-plane>

  <!-- Camera & Score UI (δεμένο στην κάμερα) -->
  <a-camera wasd-controls look-controls>
    <a-text id="score" 
            value="Score: 0" 
            position="0 0.5 -1" 
            align="center"
            color="white"></a-text>
  </a-camera>

  <!-- VR Controllers -->
  
  

</a-scene>
</body>
</html>
