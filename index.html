<html>
<head>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://c-frame.github.io/aframe-physics-system/dist/aframe-physics-system.min.js"></script>
    <script src="https://gftruj.github.io/webzamples/aframe/controls/oculus-thumbstick-controls.js"></script>
    <script>
     var locked = true, tool = false, rain = true, message = "", time = 5000, coords;
       AFRAME.registerComponent('updating', {
            init: function () {
                coords = document.getElementById('cam');
                document.querySelector('a-scene').addEventListener('enter-vr', function () { coords = document.getElementById('rig'); });
                document.querySelector('a-scene').addEventListener('exit-vr', function () { coords = document.getElementById('cam'); });
            },
              tick: function () {
                if (rain) time--;
                if (time < 0) message = "Game over :(...";
                if (message != "") this.el.setAttribute('value', message);
                else this.el.setAttribute('value', '' + Math.round(time / 100));
             var pos = coords.getAttribute('position');
                if (pos.x < -20) pos.x = -20;
                if (pos.x > 20) pos.x = 20;
                if (pos.z < -20) pos.z = -20;
                if (pos.z > 20) pos.z = 20;
                coords.setAttribute('position', pos);
            }
        });
        AFRAME.registerComponent('focusing', {
            init: function () {
                var el = this.el;
                el.addEventListener('mouseenter', function () {
                    var pos = coords.getAttribute('position');
                    if (el.id == "door") {
                        if (!locked && time >= 0) {
                            el.components.sound.playSound();
                            message = "Well done!";
                        }
                        return;
                    }
           else if (el.id == "window") {
                        if (tool) {
                            document.querySelector('a-scene').removeAttribute('animation');
                            document.querySelector('a-scene').setAttribute('animation', 'property: rain.far; to: 1000; dur: 50000');
                            rain = false;
                            el.components.sound.playSound();
                            el.setAttribute('blending', 'subtractive');
                        }
                        return;
                    }          
                el.removeAttribute('dynamic-body');
               el.setAttribute('animation',  'property: position; to: ' + pos.x + ' 0 ' + pos.z +'; dur: 800' );
                    if (el.id == "torch") document.getElementById('light').setAttribute('animation', 'property: visible; to: true');
                    else if (el.id == "key") locked = false;
                    else if (el.id == "hammer") tool = true;
                    setTimeout(function () { el.remove(); }, 3000);
                });
            }
        });
    </script>
</head>

</body>
    <a-scene id="s1" background="color: #220000" fog="type: linear; color: #330000; near: 1; far: 25">
     <a-plane static-body width="30" height="7" position="-21 4 0" rotation="0 90 0">
     <a-box id="window" color="silver" opacity="0.8" scale="3.25 3.25 1.5" position="3 2 -0.2"
         sound="src: url(mixkit-glass-break-with-hammer-thud-759.wav)" focusing>
                <a-light distance="1" type="spot" position="0 0 1"></a-light>
                <a-light angle="90" intensity="0.01" type="spot" position="0 0 -1" rotation="180 0 0"></a-light>
            </a-box>
        </a-plane>
        <a-plane static-body width="40" height="8" position="20 4 0" rotation="0 -90 0"></a-plane>
        <a-plane static-body width="40" height="8" position="0 4 21" material="side:back"></a-plane>
        <a-plane static-body width="40" height="8" position="0 4 -21"></a-plane>
        <a-plane static-body width="40" height="40" position="0 0 0" rotation="-90 0 0"></a-plane>
        <a-plane static-body width="40" height="40" position="0 8 0" rotation="90 0 0"></a-plane>
        <a-plane id="door" height="4" width="2" color="red" position="0 2 -15.9"
            sound="src: url(mixkit-locking-a-shop-door-with-keys-202.wav)" focusing>
            <a-ring color="black" radius-inner="0.01" radius-outer="0.1" position="0.75 0 0.01"></a-ring>
        </a-plane>
        </a-scene>
</html>
