<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Grand View Hotel</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
        AFRAME.registerComponent('game-logic', {
            init: function () {
                let sceneNumber = 1;

                const sky = document.querySelector('#sky');
                const info = document.querySelector('#info');

                const doorHotel = document.querySelector('#doorHotel');
                const goRight = document.querySelector('#goRight');
                const roomDoor = document.querySelector('#roomDoor');
                const continueClick = document.querySelector('#continueClick');

                const TEXT = [
                    'You got a call late at night that a serial killer is in a hotel.\nYou are standing in front of the Grand View Hotel.\nLook at the entrance and click to go inside.',
                    'A girl is waiting in the lobby of the hotel, shaking with fear:\n"Thank god you are finally here!"\nLook to the right and click to go upstairs.',
                    'Now you are upstairs investigating.\nIn the middle of the hallway you see an open door.\nLook at the blue open door and click to enter.',
                    'You walk inside the room.\nA frightening man is sitting on the bed in a dirty room, watching TV...',
                    '"You know what hurts me the most?\nNobody asked if it was true.\nThey saw a face on the news and that was enough."\n"Killer. Monster. Psycho."\n"That is all they see now... Maybe I should stop fighting it."',
                    'I was ready to pull out my gun, but I underestimated how fast he was despite his enormous figure.\nHe grabbed me by the collar and that was the last thing I saw.'
                ];

                function hideAllButtons() {
                    doorHotel.setAttribute('visible', false);
                    goRight.setAttribute('visible', false);
                    roomDoor.setAttribute('visible', false);
                    continueClick.setAttribute('visible', false);
                }

                function showScene(number) {
                    sceneNumber = number;

                    sky.setAttribute('src', '#sky' + number);
                    info.setAttribute('value', TEXT[number - 1]);

                    hideAllButtons();

                    if (number === 1) {
                        doorHotel.setAttribute('visible', true);
                    }

                    if (number === 2) {
                        goRight.setAttribute('visible', true);
                    }

                    if (number === 3) {
                        roomDoor.setAttribute('visible', true);
                    }

                    if (number === 4 || number === 5) {
                        continueClick.setAttribute('visible', true);
                    }
                }

                doorHotel.addEventListener('click', function () {
                    showScene(2);
                });

                goRight.addEventListener('click', function () {
                    showScene(3);
                });

                roomDoor.addEventListener('click', function () {
                    showScene(4);
                });

                continueClick.addEventListener('click', function () {
                    if (sceneNumber === 4) {
                        showScene(5);
                    } else if (sceneNumber === 5) {
                        showScene(6);
                    }
                });

                showScene(1);
            }
        });
    </script>
</head>

<body>
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .interactive" game-logic>

        <a-assets>
            <img id="sky1" src="scene1.png">
            <img id="sky2" src="scene2.png">
            <img id="sky3" src="scene3.png">
            <img id="sky4" src="scene4.png">
            <img id="sky5" src="scene5.png">
            <img id="sky6" src="scene6.png">
        </a-assets>

        <a-sky id="sky" src="#sky1" rotation="0 -90 0"></a-sky>

        <!-- Κλικ στην είσοδο του ξενοδοχείου -->
        <a-circle id="doorHotel"
                  class="interactive"
                  position="0 1.4 -4"
                  radius="0.45"
                  color="white"
                  opacity="0.15"
                  visible="true">
        </a-circle>

        <!-- Στο λόμπι: κοιτάς δεξιά -->
        <a-circle id="goRight"
                  class="interactive"
                  position="4 1.5 0"
                  rotation="0 -90 0"
                  radius="0.5"
                  color="white"
                  opacity="0.15"
                  visible="false">
        </a-circle>

        <!-- Στον διάδρομο: κλικ στην ανοιχτή μπλε πόρτα -->
        <a-circle id="roomDoor"
                  class="interactive"
                  position="-4 1.5 -1.2"
                  rotation="0 70 0"
                  radius="0.55"
                  color="cyan"
                  opacity="0.2"
                  visible="false">
        </a-circle>

        <!-- Στο δωμάτιο: απλό κλικ για να συνεχίσει ο διάλογος -->
        <a-circle id="continueClick"
                  class="interactive"
                  position="0 1.5 -3"
                  radius="2"
                  color="white"
                  opacity="0.01"
                  visible="false">
        </a-circle>

        <a-camera wasd-controls="enabled:false">

            <a-plane color="#000"
                     height="0.38"
                     width="1.9"
                     opacity="0.5"
                     position="0 -0.65 -1">

                <a-text id="info"
                        value=""
                        width="1.65"
                        align="center"
                        font="monoid"
                        color="white"
                        position="0 0 0.01">
                </a-text>

            </a-plane>

            <a-cursor fuse="true"></a-cursor>
        </a-camera>

    </a-scene>
</body>

</html>
