<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Grand View Hotel</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
        /*
            MAP:
            scene1 -> NORTH -> scene2
            scene2 -> EAST  -> scene3
            scene3 -> EAST  -> scene4
            scene4 -> EAST  -> scene5
            scene5 -> EAST  -> scene6
        */
        const MAP = [
            [0, 0, 6],
    [0, 0, 5],
    [0, 0, 4],
    [0, 2, 3],
    [0, 1, 0]
        ];

        let ITEMS = [];

        const TEXT = [
            'You got a call late at night that a serial killer is in a hotel.\nYou are standing in front of the Grand View Hotel.\nLook forward and use the NORTH arrow to enter the hotel.',

            'A girl is waiting in the lobby of the hotel, shaking with fear:\n"Thank god you are finally here!"\nLook to the right and use the EAST arrow to go upstairs to the hallway.',

            'Now you are upstairs investigating.\nIn the middle of the hallway you see an open door.\nUse the EAST arrow to enter the room.',

            'You walk inside the room.\nA frightening man is sitting on the bed in a dirty room, watching TV...\nUse the EAST arrow to continue.',

            '"You know what hurts me the most?\nNobody asked if it was true.\nThey saw a face on the news and that was enough."\n"Killer. Monster. Psycho."\nThat is all they see now...\nMaybe I should stop fighting it.\nUse the EAST arrow to continue.',

            'I was ready to pull out my gun, but I underestimated how fast he was despite his enormous figure.\nHe grabbed me by the collar and that was the last thing I saw.'
        ];
    </script>

    <script src="game-logic.js"></script>
</head>

<body>
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .interactive" game-logic>

        <a-assets>
            <img id="sky1" src="scene1.png">
            <img id="sky2" src="scene2.png">
            <img id="sky3" src="scene3.png">
            <img id="sky4" src="scene4.png">
            <img id="sky5" src="scene5.png">
            <img id="sky6" src="scene6.png">
        </a-assets>

        <a-sky id="sky" rotation="0 -90 0"></a-sky>

        <a-camera wasd-controls="enabled:false">

            <a-plane color="#000"
                     height="0.42"
                     width="2"
                     opacity="0.55"
                     position="0 -0.62 -1">

                <a-text id="info"
                        value=""
                        width="1.75"
                        align="center"
                        font="monoid"
                        color="white"
                        position="0 0 0.02">
                </a-text>

                <a-cone id="east"
                        class="interactive"
                        color="white"
                        scale="0.06 0.06 0.06"
                        position="0.85 0 0.04"
                        rotation="0 -30 -88">
                </a-cone>

                <a-cone id="west"
                        class="interactive"
                        color="white"
                        scale="0.06 0.06 0.06"
                        position="-0.85 0 0.04"
                        rotation="0 30 88">
                </a-cone>

                <a-cone id="north"
                        class="interactive"
                        color="white"
                        scale="0.06 0.06 0.06"
                        position="0 0.28 0.04"
                        rotation="-20 0 0">
                </a-cone>

                <a-cone id="south"
                        class="interactive"
                        color="white"
                        scale="0.06 0.06 0.06"
                        position="0 -0.28 0.04"
                        rotation="-40 0 180">
                </a-cone>

            </a-plane>

            <a-cursor fuse="true"></a-cursor>
        </a-camera>

        <a-entity id="scene1" class="scene"></a-entity>
        <a-entity id="scene2" class="scene" visible="false"></a-entity>
        <a-entity id="scene3" class="scene" visible="false"></a-entity>
        <a-entity id="scene4" class="scene" visible="false"></a-entity>
        <a-entity id="scene5" class="scene" visible="false"></a-entity>
        <a-entity id="scene6" class="scene" visible="false"></a-entity>

    </a-scene>
</body>

</html>
