<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand View Hotel</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
        const MAP = [
    [6, 5, 4, 3, 2],
    [0, 0, 0, 0, 1]
];
        ];

        let ITEMS = [];

        const TEXT = [
            'You got a call late at night that a serial killer is in a hotel.\nYou are standing in front of the Grand View Hotel.\nLook forward and use the NORTH arrow to enter the hotel.',

            'A girl is waiting in the lobby, shaking with fear:\n"Thank god you are finally here!"\nShe is holding a room key-card.\nClick on the key-card to take it, then look right and use the EAST arrow.',

            'Now you are upstairs investigating.\nIn the hallway you see an open door.\nClick on the door to use the key-card, then use the EAST arrow to enter.',

            'You walk inside the room.\nA frightening man is sitting on the bed, watching TV.\nUse the EAST arrow to continue.',

            '"You know what hurts me the most?\nNobody asked if it was true.\nThey saw a face on the news and that was enough."\n"Killer. Monster. Psycho."\nThat is all they see now...\nMaybe I should stop fighting it.\nUse the EAST arrow to continue.',

            'I was ready to pull out my gun, but I underestimated how fast he was despite his enormous figure.\nHe grabbed me by the collar and that was the last thing I saw.'
        ];
    </script>

    <script src="game-logic.js"></script>
</head>

<body>
    <a-scene
        vr-mode-ui="enabled: true"
        device-orientation-permission-ui="enabled: true"
        cursor="rayOrigin: mouse"
        raycaster="objects: .interactive"
        game-logic>

        <a-assets>
            <img id="sky1" src="scene1.png">
            <img id="sky2" src="scene2.png">
            <img id="sky3" src="scene3.png">
            <img id="sky4" src="scene4.png">
            <img id="sky5" src="scene5.png">
            <img id="sky6" src="scene6.png">
        </a-assets>

        <a-sky id="sky" rotation="0 -90 0"></a-sky>

        <a-camera wasd-controls="enabled:false">

            <a-plane color="#000"
                     height="0.45"
                     width="2"
                     opacity="0.55"
                     position="0 -0.62 -1">

                <a-text id="info"
                        value=""
                        width="1.75"
                        align="center"
                        font="monoid"
                        color="white"
                        position="0 0 0.02">
                </a-text>

                <a-cone id="east"
                        class="interactive"
                        color="white"
                        scale="0.06 0.06 0.06"
                        position="0.85 0 0.04"
                        rotation="0 -30 -88">
                </a-cone>

                <a-cone id="west"
                        class="interactive"
                        color="white"
                        scale="0.06 0.06 0.06"
                        position="-0.85 0 0.04"
                        rotation="0 30 88">
                </a-cone>

                <a-cone id="north"
                        class="interactive"
                        color="white"
                        scale="0.06 0.06 0.06"
                        position="0 0.28 0.04"
                        rotation="-20 0 0">
                </a-cone>

                <a-cone id="south"
                        class="interactive"
                        color="white"
                        scale="0.06 0.06 0.06"
                        position="0 -0.28 0.04"
                        rotation="-40 0 180">
                </a-cone>

            </a-plane>

            <a-cursor fuse="true"></a-cursor>
        </a-camera>

        <a-entity id="scene1" class="scene"></a-entity>

        <a-entity id="scene2" class="scene" visible="false">
            <a-box class="interactive"
                   position="0 1.2 -3"
                   scale="0.35 0.05 0.22"
                   color="gold"
                   pick="a room key-card">
            </a-box>
        </a-entity>

        <a-entity id="scene3" class="scene" visible="false">
            <a-box class="interactive"
                   position="0 1.5 -3"
                   scale="0.8 1.4 0.1"
                   color="#222"
                   drop="a room key-card"
                   goal="You use the room key-card.\nThe door unlocks with a click.\nNow use the EAST arrow to enter the room."
                   fail="The door is locked.\nYou need the room key-card from the lobby.">
            </a-box>
        </a-entity>

        <a-entity id="scene4" class="scene" visible="false"></a-entity>
        <a-entity id="scene5" class="scene" visible="false"></a-entity>
        <a-entity id="scene6" class="scene" visible="false"></a-entity>

    </a-scene>
</body>

</html>
