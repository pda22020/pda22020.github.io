<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      
      <a-sky color="#2b0000"></a-sky>

      <a-box 
        position="0 5 0" 
        width="20" height="10" depth="20" 
        color="#ff0000" 
        material="side: double; roughness: 0.8" 
        shadow="receive: true">
      </a-box>

      <a-plane 
        rotation="-90 0 0" 
        width="20" height="20" 
        color="#8b0000" 
        metalness="0.2">
      </a-plane>

      <a-light type="point" color="#ffcccc" intensity="1.5" position="0 8 0"></a-light>
      <a-light type="ambient" color="#400000"></a-light>

      <a-entity id="rig" position="0 1.6 0">
        <a-camera look-controls wasd-controls="acceleration: 100"></a-camera>
      </a-entity>

    </a-scene>
  </body>
</html>
