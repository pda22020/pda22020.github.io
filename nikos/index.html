<head>
    <meta charset="utf-8">
    <title>Poopy-Shooty</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene shadow="type: pcfsoft">
        
        <a-sky color="#050000"></a-sky>

        <a-box 
            position="0 25 0" 
            width="200" height="50" depth="200" 
            color="#ff0000" 
            material="side: double; roughness: 0.9; metalness: 0"
            shadow="receive: true">
        </a-box>

        <a-plane 
            position="0 0.01 0"
            rotation="-90 0 0" 
            width="200" height="200" 
            color="#000000" 
            material="roughness: 0.9; metalness: 0.1"
            shadow="receive: true">
        </a-plane>

        <a-entity light="type: point; intensity: 1.8; distance: 200; decay: 2; color: #ffcccc; castShadow: true" position="0 25 0"></a-entity>
        <a-entity light="type: ambient; color: #400000; intensity: 0.5"></a-entity>

        <a-entity id="rig" position="0 1.6 30">
            <a-camera look-controls wasd-controls="acceleration: 100"></a-camera>
        </a-entity>

        <a-circle position="0 5 -99.9" radius="2" color="#000000" material="roughness: 1; metalness: 0"></a-circle>
        <a-sphere position="0 5 -99.9" radius="1.5" color="#5C4033" material="roughness: 0.9">
            <a-animation attribute="position" to="0 5 20" dur="5000" repeat="indefinite" easing="linear"></a-animation>
        </a-sphere>

        <a-circle position="-20 10 -99.9" radius="2" color="#000000" material="roughness: 1"></a-circle>
        <a-sphere position="-20 10 -99.9" radius="1.5" color="#5C4033" material="roughness: 0.9">
            <a-animation attribute="position" to="-20 10 20" dur="6000" begin="1000" repeat="indefinite" easing="linear"></a-animation>
        </a-sphere>

        <a-circle position="20 10 -99.9" radius="2" color="#000000" material="roughness: 1"></a-circle>
        <a-sphere position="20 10 -99.9" radius="1.5" color="#5C4033" material="roughness: 0.9">
            <a-animation attribute="position" to="20 10 20" dur="6000" begin="1500" repeat="indefinite" easing="linear"></a-animation>
        </a-sphere>

        <a-circle position="-15 3 -99.9" radius="2" color="#000000" material="roughness: 1"></a-circle>
        <a-sphere position="-15 3 -99.9" radius="1.5" color="#5C4033" material="roughness: 0.9">
            <a-animation attribute="position" to="-15 3 20" dur="7000" begin="2000" repeat="indefinite" easing="linear"></a-animation>
        </a-sphere>

        <a-circle position="15 3 -99.9" radius="2" color="#000000" material="roughness: 1"></a-circle>
        <a-sphere position="15 3 -99.9" radius="1.5" color="#5C4033" material="roughness: 0.9">
            <a-animation attribute="position" to="15 3 20" dur="7000" begin="2500" repeat="indefinite" easing="linear"></a-animation>
        </a-sphere>

    </a-scene>

</body>
