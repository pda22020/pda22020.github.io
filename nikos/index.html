<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Κόκκινο Δωμάτιο</title>
    <style>
        /* Μηδενισμός περιθωρίων */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #2b0000; /* Σκούρο κόκκινο για το βάθος */
        }

        /* Το "δωμάτιο" */
        .room {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Gradient που προσομοιώνει το φως που πέφτει στους τοίχους */
            background: radial-gradient(circle at center, #ff4d4d 0%, #800000 70%, #4d0000 100%);
            position: relative;
        }

        /* Εφέ πηγής φωτός (σαν λάμπα στο κέντρο) */
        .light-source {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 200, 200, 0.2);
            filter: blur(80px);
            border-radius: 50%;
        }

        /* Ένα απλό κείμενο */
        .text {
            color: white;
            font-family: sans-serif;
            font-size: 1.2rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="room">
        <div class="light-source"></div>
        <div class="text">Βρίσκεστε στο κόκκινο δωμάτιο.</div>
    </div>

</body>
</html>
