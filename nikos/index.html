<head>
    <meta charset="utf-8">
    <title>Poopy-Shooty - Fixed View</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene shadow="type: pcfsoft">
         <a-sky color="#1a0000"></a-sky>
         <a-box 
            position="0 10 0" 
            width="40" height="20" depth="80" 
            color="#ff0000" 
            material="side: double; roughness: 1; src: #grid; repeat: 20 10"
            shadow="receive: true">
        </a-box>
        <a-entity light="type: point; intensity: 1.5; distance: 100; color: #ffcccc; castShadow: true" position="0 15 -10"></a-entity>
        <a-entity light="type: ambient; color: #480000; intensity: 0.7"></a-entity>

        <a-entity id="rig" position="0 1.6 30">
            <a-camera fov="60" look-controls wasd-controls="acceleration: 150"></a-camera>
        </a-entity>

        <a-circle position="0 3 -39.8" radius="1.5" color="black"></a-circle>
        <a-sphere position="0 3 -39.8" radius="1" color="#5C4033">
            <a-animation attribute="position" to="0 3 40" dur="5000" repeat="indefinite" easing="linear"></a-animation>
        </a-sphere>

        <a-circle position="-10 5 -39.8" radius="1.5" color="black"></a-circle>
        <a-sphere position="-10 5 -39.8" radius="1" color="#5C4033">
            <a-animation attribute="position" to="-10 5 40" dur="6500" begin="1000" repeat="indefinite" easing="linear"></a-animation>
        </a-sphere>

        <a-circle position="10 5 -39.8" radius="1.5" color="black"></a-circle>
        <a-sphere position="10 5 -39.8" radius="1" color="#5C4033">
            <a-animation attribute="position" to="10 5 40" dur="4000" begin="500" repeat="indefinite" easing="linear"></a-animation>
        </a-sphere>
 </a-scene>
</body>
