<head>
  <meta charset="utf-8">
  <title>Poopy-Shooty</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

<script>
let score = 0;

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') shoot();
});

function shoot() {
  let camera = document.querySelector('a-camera');

  let bullet = document.createElement('a-sphere');
  bullet.setAttribute('radius', '0.15');
  bullet.setAttribute('color', 'yellow');

  let pos = camera.object3D.position.clone();
  let dir = new THREE.Vector3();
  camera.object3D.getWorldDirection(dir);

  bullet.setAttribute('position', pos);

  bullet.dataset.dx = dir.x;
  bullet.dataset.dy = dir.y;
  bullet.dataset.dz = dir.z;

  bullet.setAttribute('class', 'bullet');

  document.querySelector('a-scene').appendChild(bullet);

  setTimeout(() => bullet.remove(), 2000);
}

AFRAME.registerComponent('bullet-move', {
  tick: function () {
    let el = this.el;
    let pos = el.object3D.position;

    pos.x += parseFloat(el.dataset.dx) * 0.5;
    pos.y += parseFloat(el.dataset.dy) * 0.5;
    pos.z += parseFloat(el.dataset.dz) * 0.5;

    let enemies = document.querySelectorAll('.enemy');

    enemies.forEach(enemy => {
      let ep = enemy.object3D.position;

      let dist = pos.distanceTo(ep);

      if (dist < 1) {
        enemy.remove();
        el.remove();

        score++;
        document.querySelector('#score')
          .setAttribute('value', 'Score: ' + score);
      }
    });
  }
});

AFRAME.registerComponent('enemy-ai', {
  tick: function () {
    let player = document.querySelector('a-camera');
    let dist = this.el.object3D.position.distanceTo(player.object3D.position);

    if (dist < 2) {
      alert("Game Over");
      location.reload();
    }
  }
});

setInterval(() => {
  let enemy = document.createElement('a-sphere');

  enemy.setAttribute('class', 'enemy');
  enemy.setAttribute('radius', '1');
  enemy.setAttribute('color', '#5C4033');

  let x = Math.random() * 20 - 10;
  let y = Math.random() * 5 + 2;

  enemy.setAttribute('position', `${x} ${y} -40`);
  enemy.setAttribute('enemy-ai', '');

  enemy.setAttribute('animation',
    'property: position; to: 0 3 5; dur: 3000; easing: linear');

  document.querySelector('a-scene').appendChild(enemy);
}, 1500);

</script>

<a-scene>

  <a-box position="0 10 0" width="40" height="20" depth="80" color="#ff0000"></a-box>

  <a-camera wasd-controls look-controls>
    <a-cursor></a-cursor>
  </a-camera>

  <a-text id="score" value="Score: 0" position="-2 2 -3" color="white"></a-text>

</a-scene>

<script>
document.addEventListener('DOMContentLoaded', () => {
  setInterval(() => {
    document.querySelectorAll('.bullet').forEach(b => {
      if (!b.components['bullet-move']) {
        b.setAttribute('bullet-move', '');
      }
    });
  }, 50);
});
</script>

</body>
