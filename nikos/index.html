<head>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script>
    const scene = document.getElementById('scene');
    let x = 0, y = 0, z = 0; // Θέση
    let rotateX = 0, rotateY = 0; // Περιστροφή (μοίρες)
    const speed = 20;
    const sensitivity = 0.1; // Ευαισθησία ποντικιού

    // Κλείδωμα ποντικιού με κλικ στο δωμάτιο
    document.body.addEventListener('click', () => {
        document.body.requestPointerLock();
    });

    // Έλεγχος κίνησης ποντικιού
    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement === document.body) {
            rotateY += e.movementX * sensitivity;
            rotateX -= e.movementY * sensitivity;

            // Περιορισμός στο πάνω-κάτω για να μην "τουμπάρει" η κάμερα
            rotateX = Math.max(-80, Math.min(80, rotateX));
            
            updateTransform();
        }
    });

    // Έλεγχος πλήκτρων WASD
    document.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        
        // Υπολογισμός κίνησης βάσει της γωνίας που κοιτάμε (προαιρετικό για απλότητα εδώ)
        if (key === 'w') z += speed;
        if (key === 's') z -= speed;
        if (key === 'a') x += speed;
        if (key === 'd') x -= speed;

        updateTransform();
    });

    function updateTransform() {
        // Η σειρά έχει σημασία: Πρώτα η περιστροφή και μετά η μετατόπιση
        scene.style.transform = `
            rotateX(${rotateX}deg) 
            rotateY(${rotateY}deg) 
            translate3d(${x}px, ${y}px, ${z}px)
        `;
    }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            perspective: 800px; /* Η "κάμερα" μας */
        }

        /* Ο "κόσμος" που μετακινείται */
        #scene {
            width: 100vw;
            height: 100vh;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s linear; /* Ομαλή κίνηση */
        }

        .wall {
            position: absolute;
            width: 2000px; /* Μεγάλο δωμάτιο */
            height: 2000px;
            background: radial-gradient(circle, #ff1a1a 0%, #4d0000 100%);
            border: 2px solid rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Τοποθέτηση τοίχων στο χώρο */
        .back   { transform: translate3d(-50%, -50%, -1000px); left: 50%; top: 50%; width: 2000px; height: 1000px; }
        .floor  { transform: translate3d(-50%, -50%, 0) rotateX(90deg); left: 50%; top: 100%; width: 2000px; height: 2000px; background: repeating-linear-gradient(rgba(0,0,0,0.2) 0 2px, transparent 2px 50px), repeating-linear-gradient(90deg, rgba(0,0,0,0.2) 0 2px, transparent 2px 50px), #800000; }
        .ceil   { transform: translate3d(-50%, -50%, 0) rotateX(-90deg); left: 50%; top: 0%; width: 2000px; height: 2000px; background: #600000; }
        .left   { transform: translate3d(-1000px, -50%, 0) rotateY(90deg); left: 0; top: 50%; width: 2000px; height: 1000px; }
        .right  { transform: translate3d(0, -50%, 0) rotateY(-90deg); left: 100%; top: 50%; width: 2000px; height: 1000px; }

        /* Φως στο ταβάνι */
        .light {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,100,100,0.4) 0%, transparent 70%);
            transform: translate3d(-50%, -50%, -500px);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="scene">
        <div class="wall back"></div>
        <div class="wall floor"></div>
        <div class="wall ceil"></div>
        <div class="wall left"></div>
        <div class="wall right"></div>
        <div class="light"></div>
    </div>

    <script>
        const scene = document.getElementById('scene');
        let x = 0, y = 0, z = 0;
        const step = 20; // Ταχύτητα κίνησης

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            if (key === 'w') z += step; // Μπροστά
            if (key === 's') z -= step; // Πίσω
            if (key === 'a') x += step; // Αριστερά
            if (key === 'd') x -= step; // Δεξιά

            // Ενημέρωση της θέσης του δωματίου (αντίστροφα από την κίνηση του παίκτη)
            scene.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
        });
    </script>
</body>
</html>
