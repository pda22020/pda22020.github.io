  <head>
    <title>Poopy-Shooty</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
       <a-sky color="#2b0000"></a-sky>
       <a-box 
        position="0 5 0" 
        width="200" height="50" depth="200" 
        color="#ff0000" 
        material="side: double; roughness: 0.8" 
        shadow="receive: true">
      </a-box>
      <a-light type="point" color="#ffcccc" intensity="2" position="0 8 0"></a-light>
      <a-light type="ambient" color="#400000"></a-light>
     <a-entity id="rig" position="0 1.6 0">
        <a-camera look-controls wasd-controls="acceleration: 100"></a-camera>
     </a-entity>
   </a-scene>
  </body>
