<head>
  <meta charset="utf-8">
  <title>Poopy-Shooty</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
<script>
let score = 0;
AFRAME.registerComponent('shootable', {
  init: function () {
    this.el.addEventListener('click', () => {
      this.el.setAttribute('visible', false);
      score++;
      document.querySelector('#score')
        .setAttribute('value', 'Score: ' + score);
    });
  }
});
AFRAME.registerComponent('enemy-ai', {
  tick: function () {
    let player = document.querySelector('a-camera');
    let dist = this.el.object3D.position.distanceTo(
      player.object3D.position
    );
    if (dist < 2) {
      alert("Game Over");
      location.reload();
    }
  }
});
setInterval(() => {
  let enemy = document.createElement('a-sphere');

  enemy.setAttribute('class', 'enemy');
  enemy.setAttribute('radius', '1');
  enemy.setAttribute('color', '#5C4033');

  let x = Math.random() * 20 - 10;
  let y = Math.random() * 5 + 2;

  enemy.setAttribute('position', `${x} ${y} -40`);

  enemy.setAttribute('shootable', '');
  enemy.setAttribute('enemy-ai', '');

  enemy.setAttribute('animation',
    'property: position; to: 0 3 5; dur: 3000; easing: linear');

  document.querySelector('a-scene').appendChild(enemy);
}, 2000);
</script>
<a-scene shadow="type: pcfsoft">
  <a-box 
    position="0 10 0" 
    width="40" height="20" depth="80" 
    color="#ff0000"
    material="side: double"
    shadow="receive: true">
  </a-box>
 <a-entity light="type: point; intensity: 1.5; distance: 100; color: #ffcccc" position="0 15 -10"></a-entity>
  <a-entity light="type: ambient; color: #480000; intensity: 0.7"></a-entity>
  <a-camera fov="60" wasd-controls look-controls>
    <a-cursor raycaster="objects: .enemy" color="yellow"></a-cursor>
  </a-camera>

  <!-- Score -->
  <a-text id="score" value="Score: 0" position="-2 2 -3" color="white"></a-text>

</a-scene>

</body>
